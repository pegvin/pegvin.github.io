<!DOCTYPE html>
<html>
<head>
	<title>Pixel Art Maker!</title>
	<link rel="stylesheet" href="styles.css">
	<link rel="shortcut icon" href="icons/palette.png" type="image/x-icon">
</head>

<body>
	<h1>Pixel Art Maker</h1>

	<form id="sizePicker">
		<label for="inputHeight">Grid Height:&nbsp;</label>
		<input type="number" id="inputHeight" name="height" min="1" max="20" value="8"><br>
		<label for="inputWidth">Grid Width:&nbsp;&nbsp;</label>
		<input type="number" id="inputWidth" name="width" min="1" max="20" value="8"><br>
		<button id="inputSubmit">Create</button>
	</form>

	<h2>Tools</h2>
	<label>
		<input type="color" id="colorPicker" value="#a6ff00">
		<img id="colorIcon" src="icons/palette.png">
	</label>

	<label>
		<input type="radio" id="brush" name="tool" checked>
		<img src="icons/brush.png">
	</label>

	<label>
		<input type="radio" id="eraser" name="tool" >
		<img src="icons/eraser.png">
	</label>

	<div id="canvasHolder">
		<table id="pixelCanvas"></table>
	</div>

	<button id="downloadButton">Download</button>

	<div id="previewImage"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
