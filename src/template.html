<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{title}} | 0ref</title>
	<link rel="icon" type="image/png" href="/favicon.png" />
	<style>
		@import "/lib/hljs-11.9.0/default.min.css";

		@font-face {
			font-family: 'Liberation Mono';
			src: url('/fonts/liberation-mono/LiberationMono.woff2') format('woff2'), url('/fonts/liberation-mono/LiberationMono.woff') format('woff');
			font-weight: 400;
			font-style: normal;
			font-display: swap
		}
		@font-face {
			font-family: 'Liberation Mono';
			src: url('/fonts/liberation-mono/LiberationMono-Italic.woff2') format('woff2'), url('/fonts/liberation-mono/LiberationMono-Italic.woff') format('woff');
			font-weight: 400;
			font-style: italic;
			font-display: swap
		}
		@font-face {
			font-family: 'Liberation Mono';
			src: url('/fonts/liberation-mono/LiberationMono-Bold.woff2') format('woff2'), url('/fonts/liberation-mono/LiberationMono-Bold.woff') format('woff');
			font-weight: 700;
			font-style: normal;
			font-display: swap
		}
		@font-face {
			font-family: 'Liberation Mono';
			src: url('/fonts/liberation-mono/LiberationMono-BoldItalic.woff2') format('woff2'), url('/fonts/liberation-mono/LiberationMono-BoldItalic.woff') format('woff');
			font-weight: 700;
			font-style: italic;
			font-display: swap
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-smooth: never;
			font-kerning: normal;
			font-feature-settings: kern;
			text-rendering: optimizeLegibility;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			scroll-behavior: smooth;
		}

		:root {
			font-size: 110%;
			letter-spacing: -0.5px;
			line-height: 1.3;
			font-family: "Liberation Mono", monospace;
			tab-size: 2;
		}

		@media (prefers-color-scheme: light) {
			body {
				color: #000;
				background: #FFF;
			}
			a, a:visited {
				color: #000;
				text-decoration-color: #000 !important;
			}
			code:not(pre code) {
				color: #000 !important;
			}
			hr {
				border-top: 1px solid #000;
			}
			.hljs-ln-numbers {
				color: #999;
				border-right: 1px solid #999;
			}
		}
		@media (prefers-color-scheme: dark) {
			body {
				color: #dfffd6;
				background: #030600;
			}
			a, a:visited {
				color: inherit;
				text-decoration-color: #5CFF00 !important;
			}
			code:not(pre code) {
				color: inherit !important;
			}
			hr {
				border-top: 1px solid #4A743E;
			}
			.hljs-ln-numbers {
				color: #4A743E;
				border-right: 1px solid #4A743E;
			}
		}

		body {
			margin: 1rem auto 3rem auto;
			padding: 0 0.75rem;
			max-width: 720px;
		}

		body, p, pre, code {
			font-size: 1rem;
		}
		h1, h2, h3, h4, h5, h6 {
			text-transform: capitalize;
			font-weight: 400;
			letter-spacing: 0.5px;
			margin-top: 1.75rem;
		}
		p {
			margin-top: 1.5rem;
		}
		h1 + p, h2 + p, h3 + p, h4 + p, h5 + p, h6 + p {
			margin-top: 0.5rem;
		}

		ul, ol {
			margin-top: 1rem;
		}
		ul {
			padding-left: 1.25rem;
		}
		ol {
			padding-left: 1.75rem;
		}
		ul > li:not(:first-of-type), ol > li:not(:first-of-type) {
			margin-top: 0.25rem;
		}
		ul {
			list-style: none;
		}
		ul li:before {
			content: "- ";
			margin-left: -2ch;
			width: 2ch;
			display: inline-block;
		}

		a {
			line-height: 1.5 !important;
			text-decoration: underline;
			text-underline-offset: 0.17rem;
		}
		a:hover {
			text-decoration: none;
		}

		img {
			display: block;
			margin: 0 auto;
			max-width: 100%;
		}

		pre {
			overflow: auto;
			scrollbar-width: thin;
			white-space: pre;
			margin-top: 1rem;
			margin-left: 0.5rem;
		}
		pre code, pre {
			background: none !important;
		}
		pre code {
			padding: 0 !important;
		}
		code:not(pre code) {
			font-weight: bold;
		}
		.hljs-ln-numbers {
			user-select: none;
			text-align: right;
			vertical-align: top;
			padding-right: 0.5rem !important;
		}
		.hljs-ln-code {
			white-space: pre;
			padding-left: 0.5rem !important;
			padding-right: 0.5rem !important;
		}

		body > nav > a, body > nav > a:hover {
			text-decoration: none;
		}
		body > nav > a:not(:first-of-type) {
			margin-left: 1ch;
		}
		body > header > div > time {
			display: inline;
			font-size: 0.9rem;
			opacity: 0.75;
		}
		body > header > div > time.modified_on {
			font-style: italic;
			margin-left: 0.5rem;
		}
		body > header > div > time:empty {
			display: none;
		}
		body > header > div > time.modified_on:before {
			content: "(Edited: "
		}
		body > header > div > time.modified_on:after {
			content: ")";
		}
	</style>
	<script src="/lib/hljs-11.9.0/highlight.min.js"></script>
	<script src="/lib/hljs-line-numbers-2.8.0/highlightjs-line-numbers.min.js"></script>
	<script src="/js/main.js"></script>

	<meta property="og:locale" content="en_US">
	<meta property="og:site_name" content="0ref's blog">
	<meta property="og:type" content="website">
	<meta property="og:image" content="/favicon.png">

	<!-- Mastodon Verification -->
	<link rel="me" href="https://mastodon.social/@0ref" />
	<link rel="me" href="https://infosec.exchange/@0ref" />
	<link rel="me" href="https://defcon.social/@0ref" />
	<link rel="me" href="https://discuss.systems/@0ref" />
</head>
<body>
	<nav>
		<a href="/">home();</a>
	</nav>
	<header>
		<h1>{{title}}</h1>
		<div>
			<time>{{date}}</time>
			<time class="modified_on">{{last_modified_at}}</time>
		</div>
	</header>
	<article>{{content}}</article>
</body>
</html>
