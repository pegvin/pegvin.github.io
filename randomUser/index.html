<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
	<title>Random User</title>
</head>
<body>
<div class="container">
	<img src="#" id="profile" class="profile" draggable="false">
	<div class="holder">
		<div><i class="fas fa-user"></i>&nbsp;&nbsp;<span id="name" class="name"></span></div>
		<div><i class="fas fa-info-circle"></i>&nbsp;&nbsp;<span id="ageGender" class="age"></span></div>
		<div><i class="fas fa-flag"></i>&nbsp;&nbsp;<span id="nation"></span></div>
		<div><i class="fas fa-map-marker-alt"></i>&nbsp;&nbsp;<span id="latLong"></span></div>
		<div><i class="fas fa-envelope"></i>&nbsp;&nbsp;<span id="email"></span></div>
		<div><i class="fas fa-phone"></i>&nbsp;&nbsp;<span id="phone"></span></div>
		<div><i class="fas fa-mobile-alt"></i>&nbsp;&nbsp;<span id="cell"></span></div>
		<div><i class="fas fa-calendar-week"></i>&nbsp;&nbsp;<span id="dob"></span></div>
	</div>
	<div class="btn"><button id="genBtn">Generate New Data</button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="script.js"></script>
</body>
</html>
