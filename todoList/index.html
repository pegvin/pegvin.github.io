<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Todo List</title>
	<link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
	<link rel="stylesheet" href="styles-min.css">
	<link rel="stylesheet" href="assets/fawesome/css/all.min.css">
	<link rel="stylesheet" href="assets/swal2/sweetalert2.min.css">
</head>
<body>

<div class="container">
	<p class="todoHeader">
		<label for="input-task" style="color: #64d143;">Add Item</label>
		<input id="input-task" type="text">
		<button id="add-task-btn">Add</button>
	</p>

	<h3 style="color: #64d143;">Todo</h3>

	<div class="todoBody">
		<ul id="tasks"></ul>
	</div>
</div>

<div id="controls">
	<i data-tippy-touch="false" data-tippy-content="Clear The Selected Tasks" id="clear-done-btn" class="far fa-check-circle"></i>
	<i data-tippy-touch="false" data-tippy-content="Delete All The Tasks ( Saved Too! )" id="delete-all-btn" class="far fa-trash-alt"></i>
	<i data-tippy-touch="false" data-tippy-content="Save All The Tasks" id="save-all-btn" class="far fa-save"></i>
	<i data-tippy-touch="false" data-tippy-content="Load All The Saved Tasks" id="load-all-btn" class="fas fa-upload"></i>
</div>

<script src="assets/jquery-3.6.0.min.js"></script>
<script src="assets/swal2/sweetalert2.min.js"></script>
<script src="assets/tippy/popper.min.js"></script>
<script src="assets/tippy/tippy-bundle.min.js"></script>
<script src="assets/jquery-cookie-2.1.min.js"></script>
<script src="script-min.js"></script>

</body>
</html>
